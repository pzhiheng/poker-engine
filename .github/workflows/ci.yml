name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  # ── Java API ─────────────────────────────────────────────────────────────
  java-api:
    name: Java API — build & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: poker
          POSTGRES_USER: poker
          POSTGRES_PASSWORD: poker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build & test
        working-directory: java-api
        run: ./mvnw verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/poker
          SPRING_DATASOURCE_USERNAME: poker
          SPRING_DATASOURCE_PASSWORD: poker
          JWT_SECRET: "ci-test-secret-at-least-32-chars-long"

  # ── Go Odds Service ───────────────────────────────────────────────────────
  go-odds:
    name: Go Odds — build, test & docker
    runs-on: ubuntu-latest
    # go-odds has no database dependency; no postgres service required.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-odds/go.mod
          cache-dependency-path: go-odds/go.sum

      - name: Build binary
        working-directory: go-odds
        run: go build ./...

      - name: Test (with race detector)
        working-directory: go-odds
        run: go test -race -count=1 ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: go-odds
          push: false
          tags: go-odds:ci
          # GHA layer cache — first run pulls ECR Public; subsequent runs
          # use the cached layers and never touch any external registry.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── End-to-end smoke test ─────────────────────────────────────────────────
  smoke-test:
    name: Smoke test — seed script (native binaries)
    runs-on: ubuntu-latest
    needs: [java-api, go-odds]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: poker
          POSTGRES_USER: poker
          POSTGRES_PASSWORD: poker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-odds/go.mod
          cache-dependency-path: go-odds/go.sum

      # ── Start go-odds ──────────────────────────────────────────────────────
      - name: Build go-odds binary
        working-directory: go-odds
        run: go build -o /tmp/go-odds-bin ./cmd/server

      - name: Start go-odds
        run: HTTP_PORT=8081 GRPC_PORT=50051 /tmp/go-odds-bin &

      - name: Wait for go-odds
        run: >-
          timeout 30 bash -c
          'until curl -sf http://localhost:8081/health; do sleep 1; done'

      # ── Build & start java-api ─────────────────────────────────────────────
      - name: Build java-api JAR
        working-directory: java-api
        run: ./mvnw -B --no-transfer-progress package -DskipTests -q

      - name: Start java-api
        run: |
          java \
            -XX:+UseContainerSupport \
            -XX:MaxRAMPercentage=75.0 \
            -jar java-api/target/java-api-0.0.1-SNAPSHOT.jar &
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/poker
          SPRING_DATASOURCE_USERNAME: poker
          SPRING_DATASOURCE_PASSWORD: poker
          JWT_SECRET: "ci-smoke-test-secret-must-be-32-chars-xyz"
          GO_ODDS_ENABLED: "true"
          GO_ODDS_HOST: localhost
          GO_ODDS_PORT: "50051"
          SPRING_THREADS_VIRTUAL_ENABLED: "true"

      - name: Wait for java-api
        run: >-
          timeout 120 bash -c
          'until curl -sf http://localhost:8080/actuator/health; do sleep 2; done'

      # ── Smoke test ─────────────────────────────────────────────────────────
      - name: Run seed script
        run: POKER_API=http://localhost:8080 docs/seed.sh

name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  # ── Java API ─────────────────────────────────────────────────────────────
  java-api:
    name: Java API — build & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: poker
          POSTGRES_USER: poker
          POSTGRES_PASSWORD: poker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build & test
        working-directory: java-api
        run: ./mvnw verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/poker
          SPRING_DATASOURCE_USERNAME: poker
          SPRING_DATASOURCE_PASSWORD: poker
          JWT_SECRET: "ci-test-secret-at-least-32-chars-long"

  # ── Go Odds Service ───────────────────────────────────────────────────────
  go-odds:
    name: Go Odds — build & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: poker
          POSTGRES_USER: poker
          POSTGRES_PASSWORD: poker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-odds/go.mod
          cache-dependency-path: go-odds/go.sum

      - name: Build
        working-directory: go-odds
        run: go build ./...

      - name: Test
        working-directory: go-odds
        run: go test -race -count=1 ./...
        env:
          DB_DSN: "postgres://poker:poker@localhost:5432/poker?sslmode=disable"

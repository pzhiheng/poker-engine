spring.application.name=java-api

# ── Virtual Threads (Java 21) ─────────────────────────────────────────────────
spring.threads.virtual.enabled=${SPRING_THREADS_VIRTUAL_ENABLED:true}

# ── DataSource ────────────────────────────────────────────────────────────────
# Defaults point at the Docker Compose postgres service.
# Override via environment variables in production / CI.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/poker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:poker}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:poker}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# "validate" — Hibernate checks the schema matches entities but never modifies it;
# Flyway owns all DDL.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# ── JWT ───────────────────────────────────────────────────────────────────────
# Secret must be ≥ 32 chars (256-bit HMAC-SHA256).
# Override via JWT_SECRET env var in production / Docker Compose.
jwt.secret=${JWT_SECRET:dev-secret-change-me-in-production-32c}
# Token lifetime: 24 hours by default
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# ── Structured JSON logging (Spring Boot 3.4+) ────────────────────────────────
# Off by default so local / test output remains human-readable.
# Set LOG_FORMAT=ecs (or logstash / gelf) in the container environment to
# emit newline-delimited JSON that log aggregators (ELK, Loki) can parse.
logging.structured.format.console=${LOG_FORMAT:}

# ── go-odds gRPC client ───────────────────────────────────────────────────────
# Set GO_ODDS_ENABLED=true in Docker Compose (or production) to use the real
# gRPC equity provider.  Defaults to false so unit/integration tests use the
# lightweight StubEquityProvider instead.
go-odds.enabled=${GO_ODDS_ENABLED:false}
go-odds.host=${GO_ODDS_HOST:localhost}
go-odds.port=${GO_ODDS_PORT:50051}
# Monte Carlo trials per equity call (lower than server default for latency)
go-odds.trials=${GO_ODDS_TRIALS:10000}

version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: poker
      POSTGRES_USER: poker
      POSTGRES_PASSWORD: poker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poker"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Go Odds Service ─────────────────────────────────────────────────────
  go-odds:
    build:
      context: ./go-odds
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9090:9090"   # gRPC
      - "9091:9091"   # HTTP metrics / health / pprof
    environment:
      GRPC_PORT: 9090
      HTTP_PORT: 9091
      DB_DSN: "postgres://poker:poker@postgres:5432/poker?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9091/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Java API ────────────────────────────────────────────────────────────
  java-api:
    build:
      context: ./java-api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/poker
      SPRING_DATASOURCE_USERNAME: poker
      SPRING_DATASOURCE_PASSWORD: poker
      SPRING_THREADS_VIRTUAL_ENABLED: "true"
      ODDS_SERVICE_HOST: go-odds
      ODDS_SERVICE_PORT: 9090
      JWT_SECRET: "change-me-in-production-use-a-long-random-string"
    depends_on:
      postgres:
        condition: service_healthy
      go-odds:
        condition: service_healthy

  # ── Prometheus ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9092:9090"
    volumes:
      - ./docs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  # ── Grafana ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: poker
    volumes:
      - grafana_data:/var/lib/grafana

  # ── Jaeger (all-in-one) ─────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP

volumes:
  postgres_data:
  grafana_data:
